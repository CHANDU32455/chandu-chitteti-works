<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Anonymous real-time chat on the Tor network. No accounts, no logs, messages vanish in 24 hours." />
  <title>💬 VOID CHAT — Global Anonymous Channel</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

    :root {
      --green:      #00ff41;
      --green-dim:  #00cc33;
      --green-dark: #003300;
      --cyan:       #00ffff;
      --red:        #ff003c;
      --orange:     #ff6600;
      --bg:         #000;
      --bg-card:    #080808;
      --text:       #c8ffc8;
      --text-dim:   #5a8a5a;
      --border:     rgba(0,255,65,0.15);
      --glow:       0 0 10px rgba(0,255,65,0.4), 0 0 30px rgba(0,255,65,0.15);
      --font-mono:  'Share Tech Mono','Courier New',monospace;
      --font-disp:  'Orbitron','Courier New',monospace;
    }

    *,*::before,*::after { margin:0; padding:0; box-sizing:border-box; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      overflow: hidden;
    }

    /* ── Layout ── */
    .chat-page {
      display: flex;
      flex-direction: column;
      height: 100vh;
      height: 100dvh;
    }

    /* ── Topbar ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding:
        max(12px, calc(10px + env(safe-area-inset-top)))
        calc(20px + env(safe-area-inset-right))
        10px
        calc(20px + env(safe-area-inset-left));
      border-bottom: 1px solid var(--border);
      background: rgba(0,0,0,0.95);
      flex-shrink: 0;
      gap: 12px;
    }

    .topbar-left  { display:flex; align-items:center; gap:14px; }
    .topbar-right { display:flex; align-items:center; gap:16px; font-size:0.7rem; letter-spacing:0.15em; }

    .back-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-dim);
      text-decoration: none;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
      border: 1px solid var(--border);
      padding: 5px 12px;
      border-radius: 3px;
      transition: all 0.2s;
    }
    .back-btn:hover { color:var(--green); border-color:var(--green); box-shadow:var(--glow); }

    .topbar-title {
      font-family: var(--font-disp);
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 0.15em;
      text-shadow: var(--glow);
    }

    .live-dot         { display:flex; align-items:center; gap:6px; color:var(--orange); }
    .live-dot-circle  { width:7px; height:7px; background:var(--orange); border-radius:50%; box-shadow:0 0 8px var(--orange); animation:blink 1.2s step-end infinite; }
    @keyframes blink  { 0%,100%{ opacity:1; } 50%{ opacity:0.2; } }

    .msg-count    { color:var(--text-dim); }
    #topbar-clock { color:var(--cyan); font-size:0.7rem; }

    /* ── Messages feed ── */
    .messages-feed {
      flex: 1;
      overflow-y: auto;
      padding: 20px 20px 35px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      background: rgba(0,0,0,0.6);
      scroll-behavior: smooth;
      overscroll-behavior: contain;
      -webkit-overflow-scrolling: touch;
    }

    .messages-feed::-webkit-scrollbar        { width:4px; }
    .messages-feed::-webkit-scrollbar-track  { background:transparent; }
    .messages-feed::-webkit-scrollbar-thumb  { background:var(--green-dim); border-radius:2px; }

    .feed-empty      { margin:auto; text-align:center; color:var(--text-dim); }
    .feed-empty .empty-icon { font-size:3rem; margin-bottom:12px; opacity:0.4; }
    .feed-empty p    { font-size:0.85rem; letter-spacing:0.1em; opacity:0.5; }

    /* ── Message bubble ── */
    .message-row {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      animation: fadeSlide 0.25s ease-out;
      max-width: 80%;
    }
    @keyframes fadeSlide { from{ opacity:0; transform:translateY(8px); } to{ opacity:1; transform:translateY(0); } }

    .msg-avatar {
      width:38px; height:38px;
      border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:1.3rem; flex-shrink:0;
      border:1px solid rgba(255,255,255,0.08);
      background:#0d0d0d;
      box-shadow:0 0 8px rgba(0,0,0,0.5);
      line-height:1; overflow:hidden;
    }

    .msg-content { flex:1; min-width:0; }

    .msg-meta {
      display:flex; align-items:baseline; gap:10px;
      margin-bottom:5px; font-size:0.68rem;
    }
    .msg-alias { color:var(--cyan); font-weight:bold; }
    .msg-time  { color:var(--text-dim); }

    .delete-msg-btn {
      background:none; border:none; color:var(--text-dim);
      cursor:pointer; font-size:0.65rem; padding:0 4px;
      margin-left:8px; opacity:0.4; transition:all 0.2s; line-height:1;
    }
    .delete-msg-btn:hover { color:var(--red); opacity:1; text-shadow:0 0 5px rgba(255,0,60,0.5); }

    .bubble-body {
      background: rgba(0,255,65,0.02);
      border: 1px solid rgba(0,255,65,0.08);
      border-left: 3px solid var(--green);
      border-radius: 4px;
      padding: 10px 14px;
      font-size: 0.88rem;
      line-height: 1.65;
      color: var(--text);
      word-break: break-word;
      white-space: pre-wrap;
      transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    .message-row:hover .bubble-body {
      border-color: rgba(0,255,65,0.25);
      border-left-color: var(--cyan);
      background: rgba(0,255,65,0.04);
      box-shadow: 0 0 10px rgba(0,255,65,0.05);
    }

    .bubble-file {
      margin-top:8px; display:inline-flex; align-items:center; gap:8px;
      padding:7px 12px;
      background:rgba(0,255,255,0.05); border:1px solid rgba(0,255,255,0.2);
      border-radius:4px; font-size:0.75rem;
    }
    .bubble-file a   { color:var(--cyan); text-decoration:none; word-break:break-all; }
    .bubble-file a:hover { text-decoration:underline; }

    .bubble-img {
      display:block; margin-top:8px;
      max-width:260px; max-height:200px;
      border-radius:4px; border:1px solid var(--border);
      cursor:zoom-in; transition:transform 0.2s;
    }
    .bubble-img:hover { transform:scale(1.04); }

    .bubble-video {
      display:block; margin-top:8px;
      width:100%; max-width:320px; max-height:240px;
      border-radius:4px; border:1px solid var(--border);
      outline:none; background:#000;
    }

    /* ── Input area ── */
    .input-area {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: #050505;
      padding:
        16px
        calc(20px + env(safe-area-inset-right))
        calc(70px + env(safe-area-inset-bottom))
        calc(20px + env(safe-area-inset-left));
    }

    .input-top {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      align-items: center;
    }

    /* Avatar button */
    .avatar-btn {
      width:40px; height:40px; border-radius:50%;
      background:#0d0d0d; border:2px solid var(--border);
      cursor:pointer; font-size:1.4rem;
      display:flex; align-items:center; justify-content:center;
      transition:all 0.25s; flex-shrink:0; line-height:1; position:relative;
    }
    .avatar-btn:hover { border-color:var(--green); box-shadow:var(--glow); transform:scale(1.08); }
    .avatar-btn .edit-badge {
      position:absolute; bottom:-2px; right:-2px;
      width:14px; height:14px;
      background:var(--green); border-radius:50%; border:1px solid #000;
      font-size:0.55rem; display:flex; align-items:center; justify-content:center;
      color:#000; font-weight:bold;
    }

    #alias-input {
      flex:0 0 180px; background:#000;
      border:1px solid var(--border); color:var(--green);
      font-family:var(--font-mono); font-size:0.8rem;
      padding:8px 12px; border-radius:4px; outline:none; transition:border 0.2s;
    }
    #alias-input:focus { border-color:var(--cyan); box-shadow:0 0 8px rgba(0,255,255,0.25); }

    .attach-label {
      display:flex; align-items:center; gap:7px;
      padding:7px 14px;
      border:1px dashed var(--border); border-radius:4px;
      font-size:0.75rem; color:var(--green); cursor:pointer;
      transition:all 0.2s; white-space:nowrap;
    }
    .attach-label:hover       { border-color:var(--green); background:rgba(0,255,65,0.05); }
    .attach-label.has-file    { border-color:var(--cyan); color:var(--cyan); background:rgba(0,255,255,0.05); }

    #file-input { display:none; }

    #clear-attach {
      background:none; border:1px solid rgba(255,0,60,0.4); color:var(--red);
      cursor:pointer; font-size:1rem; width:30px; height:30px;
      border-radius:3px; display:none; align-items:center; justify-content:center;
      transition:all 0.2s;
    }
    #clear-attach:hover { background:rgba(255,0,60,0.1); }

    .input-bottom { display:flex; gap:10px; align-items:flex-end; }

    #msg-input {
      flex:1; background:#000; border:1px solid var(--border);
      color:var(--green); font-family:var(--font-mono); font-size:0.88rem;
      padding:10px 14px; border-radius:4px; outline:none;
      resize:none; min-height:48px; max-height:120px;
      transition:border 0.2s; line-height:1.5;
    }
    #msg-input:focus      { border-color:var(--green); box-shadow:var(--glow); }
    #msg-input::placeholder { color:var(--text-dim); }

    .send-btn {
      background:var(--green-dark); border:1px solid var(--green); color:var(--green);
      font-family:var(--font-disp); font-weight:bold; font-size:0.78rem;
      letter-spacing:0.1em; padding:12px 24px; border-radius:4px;
      cursor:pointer; transition:all 0.25s; white-space:nowrap; height:48px;
    }
    .send-btn:hover    { background:var(--green); color:#000; box-shadow:var(--glow); }
    .send-btn:disabled { opacity:0.4; cursor:default; }

    .progress-wrap {
      margin-top:8px; display:none; height:16px;
      border:1px solid var(--border); border-radius:3px;
      background:#000; position:relative; overflow:hidden;
    }
    .progress-bar   { height:100%; width:0; background:linear-gradient(90deg,var(--green-dim),var(--cyan)); transition:width 0.1s linear; }
    .progress-label { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:0.62rem; color:#fff; font-weight:bold; }

    /* ── Avatar picker modal ── */
    .avatar-modal-overlay {
      position:fixed; inset:0;
      background:rgba(0,0,0,0.88);
      display:flex; align-items:center; justify-content:center;
      z-index:1000; opacity:0; pointer-events:none; transition:opacity 0.2s;
    }
    .avatar-modal-overlay.open { opacity:1; pointer-events:all; }

    .avatar-modal {
      background:#090909; border:1px solid var(--green); border-radius:8px;
      padding:28px; max-width:480px; width:95%;
      box-shadow:0 0 40px rgba(0,255,65,0.2);
      transform:translateY(20px); transition:transform 0.2s;
    }
    .avatar-modal-overlay.open .avatar-modal { transform:translateY(0); }

    .modal-title  { font-family:var(--font-disp); font-size:0.85rem; color:var(--green); letter-spacing:0.2em; margin-bottom:6px; }
    .modal-sub    { font-size:0.72rem; color:var(--text-dim); margin-bottom:20px; letter-spacing:0.05em; }

    .avatar-grid  { display:grid; grid-template-columns:repeat(8,1fr); gap:8px; margin-bottom:20px; }
    .avatar-option {
      width:100%; aspect-ratio:1; background:#0d0d0d;
      border:1px solid rgba(255,255,255,0.06); border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:1.4rem; cursor:pointer; transition:all 0.15s; line-height:1;
    }
    .avatar-option:hover   { border-color:var(--green); background:rgba(0,255,65,0.08); transform:scale(1.1); }
    .avatar-option.selected{ border-color:var(--green); border-width:2px; background:rgba(0,255,65,0.12); box-shadow:0 0 10px rgba(0,255,65,0.4); transform:scale(1.12); }

    .modal-actions { display:flex; gap:10px; justify-content:flex-end; }

    .modal-cancel {
      background:none; border:1px solid var(--border); color:var(--text-dim);
      font-family:var(--font-mono); font-size:0.8rem;
      padding:8px 18px; border-radius:4px; cursor:pointer; transition:all 0.2s;
    }
    .modal-cancel:hover { border-color:var(--text-dim); color:var(--text); }

    .modal-confirm {
      background:var(--green-dark); border:1px solid var(--green); color:var(--green);
      font-family:var(--font-disp); font-size:0.78rem; font-weight:bold;
      letter-spacing:0.1em; padding:8px 22px; border-radius:4px; cursor:pointer; transition:all 0.2s;
    }
    .modal-confirm:hover { background:var(--green); color:#000; }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .message-row    { max-width:96%; gap:8px; }
      .msg-avatar     { width:32px; height:32px; font-size:1.1rem; }
      .bubble-body    { padding:10px 12px; font-size:0.85rem; }
      .avatar-grid    { grid-template-columns:repeat(6,1fr); }
      .input-top      { flex-wrap:nowrap; gap:8px; }
      .attach-label:not(.has-file) #attach-label-text { display:none; }
      .attach-label   { padding:8px 12px; }
      #alias-input    { flex:1; min-width:0; font-size:0.75rem; padding:8px 10px; }
      .avatar-btn     { width:36px; height:36px; font-size:1.2rem; }
      #msg-input      { font-size:0.82rem; padding:8px 12px; }
      .send-btn       { padding:10px 16px; font-size:0.72rem; height:40px; }
      .bubble-img     { max-width:100%; max-height:160px; }
      .bubble-video   { max-width:100%; }
    }

    @media (max-width: 380px) {
      .topbar-title { display:none; }
      .msg-count    { display:none; }
    }
  </style>
</head>

<body>

  <!-- Avatar picker modal -->
  <div class="avatar-modal-overlay" id="avatar-modal-overlay" role="dialog" aria-modal="true" aria-label="Choose your avatar">
    <div class="avatar-modal">
      <div class="modal-title">// CHOOSE YOUR AVATAR</div>
      <div class="modal-sub">Stored locally. Anonymous. Change any time.</div>
      <div class="avatar-grid" id="avatar-grid"></div>
      <div class="modal-actions">
        <button class="modal-cancel"  id="modal-cancel">CANCEL</button>
        <button class="modal-confirm" id="modal-confirm">CONFIRM ✓</button>
      </div>
    </div>
  </div>

  <div class="chat-page">

    <!-- Top bar -->
    <div class="topbar">
      <div class="topbar-left">
        <a href="index.html" class="back-btn">← BACK</a>
        <span class="topbar-title">💬 VOID CHAT</span>
      </div>
      <div class="topbar-right">
        <div class="live-dot">
          <div class="live-dot-circle"></div>
          <span>LIVE</span>
        </div>
        <span class="msg-count" id="msg-count">0 messages</span>
        <span id="topbar-clock"></span>
      </div>
    </div>

    <!-- Messages feed -->
    <div class="messages-feed" id="messages-feed" role="log" aria-live="polite">
      <div class="feed-empty" id="feed-empty">
        <div class="empty-icon">📡</div>
        <p>AWAITING TRANSMISSIONS</p>
        <p style="margin-top:8px;font-size:0.75rem;">Be the first to speak into the void.</p>
      </div>
    </div>

    <!-- Input area -->
    <div class="input-area">
      <div class="input-top">
        <button class="avatar-btn" id="avatar-btn" title="Choose your avatar" aria-label="Choose avatar">
          <span id="avatar-display">👤</span>
          <span class="edit-badge" aria-hidden="true">✎</span>
        </button>

        <input type="text" id="alias-input" placeholder="YOUR ALIAS" maxlength="25" autocomplete="off" autocorrect="off" spellcheck="false" />

        <label for="file-input" class="attach-label" id="attach-label">
          📎 <span id="attach-label-text">ATTACH FILE</span>
        </label>
        <input type="file" id="file-input" accept="image/*,video/*,.pdf,.txt,.zip,.tar,.gz" />
        <button id="clear-attach" type="button" aria-label="Remove attachment">×</button>
      </div>
      <div class="input-bottom">
        <textarea
          id="msg-input"
          placeholder="Transmit into the void… (Enter to send, Shift+Enter for newline)"
          maxlength="1000"
          rows="1"
          aria-label="Message"
        ></textarea>
        <button class="send-btn" id="send-btn" type="button">⚡ SEND</button>
      </div>
      <div class="progress-wrap" id="progress-wrap" role="progressbar" aria-valuemin="0" aria-valuemax="100">
        <div class="progress-bar"   id="progress-bar"></div>
        <div class="progress-label" id="progress-label">0%</div>
      </div>
    </div>

  </div>

  <script>
    'use strict';

    // ── Helpers ──────────────────────────────────────────────────────────────
    const ESC_MAP = { '&':'&amp;', '<':'&lt;', '>':'&gt;', "'":'&#39;', '"':'&quot;' };
    const escHTML = s => s.replace(/[&<>'"]/g, c => ESC_MAP[c]);
    const isImg   = f => /\.(jpg|jpeg|png|gif|webp|avif)$/i.test(f);
    const isVid   = f => /\.(mp4|webm|ogg|mov)$/i.test(f);
    const pad     = n => String(n).padStart(2, '0');
    const fmtTime = ts => { const d=new Date(ts); return `${pad(d.getHours())}:${pad(d.getMinutes())}:${pad(d.getSeconds())}`; };

    // ── Clock ────────────────────────────────────────────────────────────────
    const clockEl = document.getElementById('topbar-clock');
    function tickClock() {
      const n = new Date();
      clockEl.textContent = `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())} UTC`;
    }
    tickClock();
    setInterval(tickClock, 1000);

    // ── Avatar ───────────────────────────────────────────────────────────────
    const AVATARS = [
      '👤','👻','🤖','👽','🕵️','🦊','🐺','🐉',
      '🦁','🐯','🦅','🦇','🐍','🦂','🕷️','🌚',
      '💀','👾','🎭','🤡','🃏','🎪','🔮','⚡',
      '🌑','🛸','🔱','☠️','🌿','🍄','🧿','🫀',
      '🧬','🔬','📡','🛡️','⚔️','🗡️','🧩','🎲'
    ];

    const AVATAR_KEY  = 'void_chat_avatar';
    const ALIAS_KEY   = 'void_chat_alias';
    const MY_MSGS_KEY = 'void_chat_my_msg_ids';

    let currentAvatar = localStorage.getItem(AVATAR_KEY) || '👤';
    let pendingAvatar  = currentAvatar;
    let myMessageIds   = new Set(JSON.parse(localStorage.getItem(MY_MSGS_KEY) || '[]'));

    const avatarDisplay  = document.getElementById('avatar-display');
    const avatarBtn      = document.getElementById('avatar-btn');
    const modalOverlay   = document.getElementById('avatar-modal-overlay');
    const avatarGrid     = document.getElementById('avatar-grid');
    const aliasInput     = document.getElementById('alias-input');

    aliasInput.value = localStorage.getItem(ALIAS_KEY) || '';
    aliasInput.addEventListener('input', () => localStorage.setItem(ALIAS_KEY, aliasInput.value));

    function setAvatar(emoji) {
      currentAvatar = emoji;
      avatarDisplay.textContent = emoji;
      localStorage.setItem(AVATAR_KEY, emoji);
    }

    function buildGrid() {
      avatarGrid.innerHTML = '';
      const frag = document.createDocumentFragment();
      AVATARS.forEach(emoji => {
        const btn       = document.createElement('button');
        btn.type        = 'button';
        btn.className   = 'avatar-option' + (emoji === pendingAvatar ? ' selected' : '');
        btn.textContent = emoji;
        btn.title       = emoji;
        btn.addEventListener('click', () => {
          pendingAvatar = emoji;
          avatarGrid.querySelectorAll('.avatar-option').forEach(b => b.classList.remove('selected'));
          btn.classList.add('selected');
        });
        frag.appendChild(btn);
      });
      avatarGrid.appendChild(frag);
    }

    function openModal()  { pendingAvatar = currentAvatar; buildGrid(); modalOverlay.classList.add('open'); }
    function closeModal() { modalOverlay.classList.remove('open'); }

    avatarBtn.addEventListener('click', openModal);
    document.getElementById('modal-cancel').addEventListener('click',  closeModal);
    document.getElementById('modal-confirm').addEventListener('click', () => { setAvatar(pendingAvatar); closeModal(); });
    modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

    setAvatar(currentAvatar);

    // ── Feed state ───────────────────────────────────────────────────────────
    const feed         = document.getElementById('messages-feed');
    const emptyState   = document.getElementById('feed-empty');
    const msgCountEl   = document.getElementById('msg-count');
    const msgInput     = document.getElementById('msg-input');
    const sendBtn      = document.getElementById('send-btn');
    const fileInput    = document.getElementById('file-input');
    const attachLabel  = document.getElementById('attach-label');
    const attachText   = document.getElementById('attach-label-text');
    const clearAttach  = document.getElementById('clear-attach');
    const progressWrap = document.getElementById('progress-wrap');
    const progressBar  = document.getElementById('progress-bar');
    const progressLbl  = document.getElementById('progress-label');

    let loadedIds    = new Map(); // id → DOM element
    let selectedFile = null;

    function isNearBottom() {
      return feed.scrollHeight - feed.clientHeight - feed.scrollTop < 80;
    }

    // ── Render one message ───────────────────────────────────────────────────
    function renderMessage(msg) {
      const row         = document.createElement('div');
      row.className     = 'message-row';
      row.dataset.id    = msg.id;

      // Avatar
      const av          = document.createElement('div');
      av.className      = 'msg-avatar';
      av.title          = msg.alias;
      av.textContent    = msg.avatar || '👤';
      row.appendChild(av);

      // Content
      const content     = document.createElement('div');
      content.className = 'msg-content';

      // File HTML
      let fileHTML = '';
      if (msg.file) {
        const url = `/uploads/${msg.file.filename}`;
        const safe = escHTML(msg.file.originalName);
        if (isImg(msg.file.filename)) {
          fileHTML = `<div class="bubble-file">🖼️ <a href="${url}" target="_blank" rel="noopener">${safe}</a></div>
          <img class="bubble-img" src="${url}" alt="attachment" loading="lazy" onclick="window.open(this.src,'_blank')"/>`;
        } else if (isVid(msg.file.filename)) {
          fileHTML = `<div class="bubble-file">🎥 <a href="${url}" target="_blank" rel="noopener">${safe}</a></div>
          <video class="bubble-video" src="${url}" controls preload="metadata" playsinline></video>`;
        } else {
          const sizeMB = (msg.file.size / (1024 * 1024)).toFixed(2);
          fileHTML = `<div class="bubble-file">📎 <a href="${url}" target="_blank" rel="noopener">${safe}</a> <span style="color:var(--text-dim)">(${sizeMB}MB)</span></div>`;
        }
      }

      // Delete button (only own messages)
      const delHTML = myMessageIds.has(msg.id)
        ? `<button class="delete-msg-btn" data-id="${msg.id}" title="Delete message" aria-label="Delete message">🗑️</button>`
        : '';

      content.innerHTML = `
        <div class="msg-meta">
          <span class="msg-alias">${escHTML(msg.alias)}</span>
          <span class="msg-time">${fmtTime(msg.timestamp)}</span>
          ${delHTML}
        </div>
        <div class="bubble-body">${escHTML(msg.text)}${fileHTML}</div>
      `;

      row.appendChild(content);
      return row;
    }

    // ── Update feed (incremental — no full re-render) ─────────────────────────
    function updateFeed(messages) {
      const wasNearBottom = isNearBottom() || loadedIds.size === 0;

      // Remove messages that no longer exist on server
      const serverIds = new Set(messages.map(m => m.id));
      for (const [id, el] of loadedIds) {
        if (!serverIds.has(id)) {
          el.remove();
          loadedIds.delete(id);
        }
      }

      if (messages.length === 0) {
        emptyState.style.display = 'block';
        msgCountEl.textContent   = '0 messages';
        return;
      }
      emptyState.style.display = 'none';

      let appended = 0;
      const frag = document.createDocumentFragment();

      messages.forEach(msg => {
        if (!loadedIds.has(msg.id)) {
          const el = renderMessage(msg);
          loadedIds.set(msg.id, el);
          frag.appendChild(el);
          appended++;
        }
      });

      if (appended > 0) feed.appendChild(frag);

      const total = messages.length;
      msgCountEl.textContent = `${total} message${total !== 1 ? 's' : ''}`;
      if (appended > 0 && wasNearBottom) feed.scrollTop = feed.scrollHeight;
    }

    // ── Delete message handler (event delegation) ────────────────────────────
    feed.addEventListener('click', async e => {
      const btn = e.target.closest('.delete-msg-btn');
      if (!btn) return;
      const id = btn.dataset.id;
      if (!confirm('Permanently delete this message?')) return;

      try {
        const res = await fetch(`/api/messages/${id}`, { method: 'DELETE' });
        if (!res.ok) throw new Error('Delete failed');

        const el = loadedIds.get(id);
        if (el) {
          el.style.transition = 'opacity 0.2s, transform 0.2s';
          el.style.opacity    = '0';
          el.style.transform  = 'scale(0.9)';
          setTimeout(() => {
            el.remove();
            loadedIds.delete(id);
            const count = loadedIds.size;
            msgCountEl.textContent = `${count} message${count !== 1 ? 's' : ''}`;
            if (count === 0) emptyState.style.display = 'block';
          }, 200);
        }

        myMessageIds.delete(id);
        localStorage.setItem(MY_MSGS_KEY, JSON.stringify([...myMessageIds]));
      } catch (err) {
        alert('Error: ' + err.message);
      }
    });

    // ── Polling ──────────────────────────────────────────────────────────────
    let polling = false;
    async function fetchMessages() {
      if (polling) return; // skip if previous request still in flight
      polling = true;
      try {
        const res  = await fetch('/api/messages');
        if (!res.ok) return;
        const msgs = await res.json();
        updateFeed(msgs);
      } catch (e) {
        // Network error — stay silent, retry next interval
      } finally {
        polling = false;
      }
    }

    fetchMessages();
    const pollInterval = setInterval(fetchMessages, 3000);

    // Pause polling when tab is hidden (saves bandwidth)
    document.addEventListener('visibilitychange', () => {
      if (document.hidden) clearInterval(pollInterval);
      else {
        fetchMessages();
        setInterval(fetchMessages, 3000);
      }
    });

    // ── File input ────────────────────────────────────────────────────────────
    fileInput.addEventListener('change', () => {
      if (!fileInput.files.length) { resetFile(); return; }
      const f = fileInput.files[0];
      if (f.size > 10 * 1024 * 1024) { alert('File exceeds 10 MB limit.'); resetFile(); return; }
      selectedFile = f;
      const name = f.name.length > 20 ? f.name.substring(0, 17) + '…' : f.name;
      attachText.textContent = name;
      attachLabel.classList.add('has-file');
      clearAttach.style.display = 'flex';
    });

    clearAttach.addEventListener('click', resetFile);

    function resetFile() {
      fileInput.value           = '';
      selectedFile              = null;
      attachText.textContent    = 'ATTACH FILE';
      attachLabel.classList.remove('has-file');
      clearAttach.style.display = 'none';
    }

    // ── Auto-resize textarea ──────────────────────────────────────────────────
    msgInput.addEventListener('input', () => {
      msgInput.style.height = 'auto';
      msgInput.style.height = Math.min(msgInput.scrollHeight, 120) + 'px';
    });

    // ── Enter to send ─────────────────────────────────────────────────────────
    msgInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    });

    sendBtn.addEventListener('click', sendMessage);

    // ── Send ──────────────────────────────────────────────────────────────────
    async function sendMessage() {
      const text   = msgInput.value.trim();
      const alias  = aliasInput.value.trim() || 'Anonymous';
      const avatar = currentAvatar;

      if (!text && !selectedFile) return;
      if (sendBtn.disabled) return;
      sendBtn.disabled = true;

      try {
        let uploadedFile = null;

        if (selectedFile) {
          progressWrap.style.display = 'block';
          progressBar.style.width    = '0%';
          progressLbl.textContent    = '0%';

          const formData = new FormData();
          formData.append('file', selectedFile);

          uploadedFile = await new Promise((resolve, reject) => {
            const xhr = new XMLHttpRequest();
            xhr.open('POST', '/api/upload', true);
            xhr.upload.onprogress = e => {
              if (e.lengthComputable) {
                const pct = Math.round((e.loaded / e.total) * 100);
                progressBar.style.width = pct + '%';
                progressLbl.textContent = pct + '%';
                progressWrap.setAttribute('aria-valuenow', pct);
              }
            };
            xhr.onload  = () => {
              if (xhr.status === 200) { try { resolve(JSON.parse(xhr.responseText)); } catch { reject(new Error('Invalid response')); } }
              else { try { reject(new Error(JSON.parse(xhr.responseText).error)); } catch { reject(new Error('Upload failed')); } }
            };
            xhr.onerror = () => reject(new Error('Network error'));
            xhr.send(formData);
          });
        }

        const res = await fetch('/api/messages', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ alias, text, avatar, file: uploadedFile })
        });

        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          throw new Error(err.error || 'Failed to send');
        }

        const sentMsg = await res.json();
        myMessageIds.add(sentMsg.id);
        localStorage.setItem(MY_MSGS_KEY, JSON.stringify([...myMessageIds]));

        msgInput.value        = '';
        msgInput.style.height = 'auto';
        resetFile();
        await fetchMessages();

      } catch (err) {
        alert('Error: ' + err.message);
      } finally {
        sendBtn.disabled = false;
        setTimeout(() => {
          progressWrap.style.display = 'none';
          progressBar.style.width    = '0%';
        }, 700);
      }
    }
  </script>

</body>
</html>
