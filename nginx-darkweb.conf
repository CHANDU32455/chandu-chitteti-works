server {
    listen 127.0.0.1:8080;
    server_name localhost;

    root /var/www/darkwebstuff;
    index index.html;

    # Hide nginx version
    server_tokens off;

    # Security headers
    add_header X-Frame-Options           "DENY"                     always;
    add_header X-Content-Type-Options    "nosniff"                  always;
    add_header Referrer-Policy           "no-referrer"              always;
    add_header Permissions-Policy        "geolocation=(), camera=(), microphone=()" always;
    add_header Content-Security-Policy   "default-src 'self' 'unsafe-inline'; connect-src 'self'; font-src 'self' fonts.googleapis.com fonts.gstatic.com data:; img-src 'self' data: blob:; media-src 'self' blob:;" always;

    # ── Static files ──────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # No-cache for HTML / CSS / JS so pushes are instant
    location ~* \.(html|css|js)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    }

    # Short cache for images & fonts
    location ~* \.(png|jpg|jpeg|gif|ico|woff|woff2|avif|webp)$ {
        expires 1d;
        add_header Cache-Control "public, no-transform" always;
    }

    # ── Uploads (user-submitted files) ───────────────────────────
    location /uploads {
        alias /var/www/darkwebstuff/uploads;
        expires 30d;
        add_header Cache-Control "public, no-transform" always;

        # Prevent any script execution; force browser to download or display natively
        add_header X-Content-Type-Options "nosniff" always;

        types {
            text/plain                txt;
            image/jpeg                jpg jpeg;
            image/png                 png;
            image/gif                 gif;
            image/webp                webp;
            image/avif                avif;
            video/mp4                 mp4;
            video/webm                webm;
            video/ogg                 ogg;
            application/octet-stream  *;
        }
        default_type application/octet-stream;
    }

    # ── API proxy to Node.js ──────────────────────────────────────
    location /api {
        proxy_pass             http://127.0.0.1:3000/api;
        proxy_http_version     1.1;
        proxy_set_header       Host              $host;
        proxy_set_header       X-Real-IP         $remote_addr;
        proxy_read_timeout     30s;
        proxy_connect_timeout  10s;
        proxy_send_timeout     30s;
        client_max_body_size   12M;

        # Disable buffering for upload streaming
        proxy_request_buffering off;
    }

    # ── Logs ──────────────────────────────────────────────────────
    access_log /var/log/nginx/darkwebstuff.access.log;
    error_log  /var/log/nginx/darkwebstuff.error.log warn;
}
